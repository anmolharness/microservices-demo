replicaCount: 2

image:
  registry: pkg.harness.io/9iw-060arf-7xlcnvrvjbq/microservice-demo/
  repository: inventory-service
  tag: "v1.2.0"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: harness-registry

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

# Prometheus monitoring
prometheus:
  enabled: true
  port: 8080
  path: /metrics
