apiVersion: v2
name: microservices-umbrella
description: Umbrella chart for all microservices with native canary support
type: application
version: 1.2.0
appVersion: "1.2.0"

dependencies:
  - name: orders-service
    version: "1.2.0"
    repository: "file://../orders-service"
    condition: orders-service.enabled

  - name: inventory-service
    version: "1.2.0"
    repository: "file://../inventory-service"
    condition: inventory-service.enabled

  - name: payments-service
    version: "1.2.0"
    repository: "file://../payments-service"
    condition: payments-service.enabled

  - name: notifications-service
    version: "1.2.0"
    repository: "file://../notifications-service"
    condition: notifications-service.enabled
