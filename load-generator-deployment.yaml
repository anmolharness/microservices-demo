apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: app
  labels:
    app: load-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
      - name: load-generator
        image: curlimages/curl:latest
        command: ["/bin/sh"]
        args:
          - -c
          - |
            while true; do
              # Call orders service
              curl -s http://orders-service:8080/orders || true
              sleep $(shuf -i 1-3 -n 1)

              # Create order
              curl -s -X POST http://orders-service:8080/orders/create || true
              sleep $(shuf -i 2-5 -n 1)

              # Check inventory
              curl -s http://inventory-service:8080/inventory || true
              sleep $(shuf -i 1-3 -n 1)

              # Check specific item
              curl -s http://inventory-service:8080/inventory/laptop || true
              sleep $(shuf -i 1-3 -n 1)

              # Process payment
              curl -s -X POST http://payments-service:8080/payments/process || true
              sleep $(shuf -i 2-4 -n 1)

              # Send notification
              curl -s -X POST http://notifications-service:8080/notifications/send || true
              sleep $(shuf -i 1-3 -n 1)
            done
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
